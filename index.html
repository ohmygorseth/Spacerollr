<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Rollr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="c"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.min.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBM5Ory6ZSESYsL68u7HGGVATQpT5mB3GQ",
      authDomain: "space-rollr.firebaseapp.com",
      databaseURL: "https://space-rollr-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "space-rollr",
      storageBucket: "space-rollr.firebasestorage.app",
      messagingSenderId: "546982544672",
      appId: "1:546982544672:web:e06512218c64128fa38345"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.fbSubmitScore = function(name, score) {
      return db.ref('scores').push({ name: name, score: score, ts: Date.now() }).then(function(){ return true; });
    };

    window.fbGetScores = function() {
      return new Promise(function(resolve) {
        db.ref('scores').once('value', function(snap) {
          const scores = [];
          snap.forEach(function(child) { scores.push(child.val()); });
          resolve(scores.sort(function(a,b) { return b.score - a.score; }).slice(0,10));
        }, function(err) { resolve([]); });
      });
    };
  </script>

  <script src="js/config.js"></script>
  <script src="js/level1.js"></script>
  <script src="js/level2.js"></script>
  <script src="js/level3.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
