<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Rollr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="c"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.min.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBM5Ory6ZSESYsL68u7HGGVATQpT5mB3GQ",
      authDomain: "space-rollr.firebaseapp.com",
      databaseURL: "https://space-rollr-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "space-rollr",
      storageBucket: "space-rollr.firebasestorage.app",
      messagingSenderId: "546982544672",
      appId: "1:546982544672:web:e06512218c64128fa38345"
    });
    const db = firebase.database();
    window.fbSubmitScore = function(name, score) {
      return db.ref('scores').push({ name: name, score: score, ts: Date.now() });
    };
    db.ref('scores').on('value', function(snap) {
      var scores = [];
      snap.forEach(function(child) { scores.push(child.val()); });
      window.globalScoresCache = scores.sort(function(a,b) { return b.score - a.score; }).slice(0,100);
    });
    window.fbGetScores = function() {
      return Promise.resolve(window.globalScoresCache || []);
    };
  </script>

  <script src="js/config.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
