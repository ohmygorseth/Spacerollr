<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Rollr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="c"></canvas>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, push, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBM5Ory6ZSESYsL68u7HGGVATQpT5mB3GQ",
      authDomain: "space-rollr.firebaseapp.com",
      databaseURL: "https://space-rollr-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "space-rollr",
      storageBucket: "space-rollr.firebasestorage.app",
      messagingSenderId: "546982544672",
      appId: "1:546982544672:web:e06512218c64128fa38345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Global functions for game.js to use
    window.fbSubmitScore = async function(name, score) {
      await push(ref(db, 'scores'), { name, score, ts: Date.now() });
    };

    window.fbGetScores = async function() {
      const q = query(ref(db, 'scores'), orderByChild('score'), limitToLast(10));
      const snap = await get(q);
      const scores = [];
      snap.forEach(child => scores.push(child.val()));
      return scores.sort((a,b) => b.score - a.score);
    };
  </script>
  <script src="js/config.js"></script>
  <script src="js/level1.js"></script>
  <script src="js/level2.js"></script>
  <script src="js/level3.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
